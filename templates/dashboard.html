<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Distress Sound Detection Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="bg-overlay"></div>
    <div class="dashboard-container">
        <h1>Real-Time Distress Sound Detection</h1>
        <div id="live-indicator" class="offline">Offline</div>
        <div id="meter-container">
            <div id="level-bar"></div>
        </div>
        <div id="status-msg">Status: Normal</div>
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="audio-file" name="audio" accept="audio/*">
            <button type="submit">Upload Audio</button>
        </form>
        <div id="upload-result"></div>
    </div>
    <script src="/static/dashboard.js"></script>
</body>
</html>
